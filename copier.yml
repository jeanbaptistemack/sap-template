# =============================================================================
# SYNKRONIC Python Project Template
# Usage: copier copy gh:jeanbaptistemack/sap-template ./my-project
# =============================================================================

_subdirectory: template
_answers_file: .copier-answers.yml
_min_copier_version: "9.0"

# Clean up files that only apply to specific project types
_tasks:
  - "{% if project_type != 'abap-project' %}rm -rf .abapgit.xml abap{% endif %}"
  - "{% if not enable_iac %}rm -rf tofu bicep .github/workflows/tofu-plan.yml .github/workflows/tofu-apply.yml{% endif %}"
  - "{% if not enable_ecc_stack %}rm -f .env.ecc.example{% endif %}"

# =============================================================================
# Questions
# =============================================================================

project_name:
  type: str
  help: "Nom du projet (kebab-case, ex: sap-adt-mcp)"
  validator: >-
    {% if not (project_name | regex_search('^[a-z][a-z0-9-]+$')) %}
    Le nom doit être en kebab-case minuscules (ex: sap-adt-mcp)
    {% endif %}

project_slug:
  type: str
  help: "Nom du package Python (snake_case, auto-dérivé — modifier si besoin)"
  default: "{{ project_name | replace('-', '_') }}"

project_description:
  type: str
  help: "Description courte du projet (une ligne)"

project_type:
  type: str
  help: "Type de projet (conditionne les dépendances, Dockerfile, CLAUDE.md)"
  choices:
    - mcp-server
    - abap-project
    - fabric-pipeline
  default: mcp-server

python_version:
  type: str
  help: "Version Python"
  default: "3.12"

author_name:
  type: str
  help: "Nom de l'auteur / organisation"
  default: "SYNKRONIC"

author_email:
  type: str
  help: "Email de l'auteur"
  default: "jeanbaptiste.mack@outlook.com"

github_org:
  type: str
  help: "Organisation ou username GitHub"
  default: "jeanbaptistemack"

enable_iac:
  type: bool
  default: false
  help: "Activer l'Infrastructure as Code (OpenTofu + Bicep + Azure CLI) ?"

iac_short_name:
  type: str
  help: "Nom court IaC pour le naming Azure (max 10 chars, ex: 4it, zexplore)"
  default: "{{ project_name | replace('sap-', '') | replace('-', '') | truncate(10, True, '') }}"
  when: "{{ enable_iac }}"

abap_package_name:
  type: str
  help: "Nom du package ABAP cible (ex: ZEXPLORE)"
  default: "{{ project_name | upper | replace('SAP-', '') | replace('-', '') }}"
  when: "{{ project_type == 'abap-project' }}"

enable_ecc_stack:
  type: bool
  default: false
  help: >-
    Activer un second serveur sap-adt-mcp ciblant SAP ECC EHP8 (NW 7.50) sur
    le port 8001 en plus du S/4HANA sur 8000 ? Génère .env.ecc.example, ajoute
    une entrée sap-adt-ecc dans .mcp.json.example et lance mcp-server-ecc.sh
    en post-start si .env.ecc existe.
  when: "{{ project_type in ['mcp-server', 'abap-project'] }}"

workspace_color:
  type: str
  help: "Couleur de la barre d'activité VS Code (hex, ex: #6B7280)"
  default: >-
    {%- if project_type == "mcp-server" %}#1E3A5F
    {%- elif project_type == "abap-project" %}#3D1A00
    {%- elif project_type == "fabric-pipeline" %}#0E2A1A
    {%- endif %}
